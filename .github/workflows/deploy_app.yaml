name: Deploy Application

on:
    workflow_call:
        inputs:
            environment_name:
                required: true
                type: string
            env_file:
                required: true
                type: string

permissions:
    contents: read

env:
    IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
    deploy:
        name: Deploy ${{ inputs.environment_name }}
        runs-on: ubuntu-latest
        environment:
            name: ${{ inputs.environment_name }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Upload deploy files
                uses: appleboy/scp-action@v0.1.7
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    port: ${{ secrets.SSH_PORT }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    passphrase: ${{ secrets.SSH_PASSPHRASE }}
                    fingerprint: ${{ secrets.SSH_FINGERPRINT }}
                    source: "deploy/compose.yml,deploy/Caddyfile"
                    target: ${{ secrets.DEPLOY_PATH }}
                    strip_components: 1

            -   name: Upload environment file
                uses: appleboy/scp-action@v0.1.7
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    port: ${{ secrets.SSH_PORT }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    passphrase: ${{ secrets.SSH_PASSPHRASE }}
                    fingerprint: ${{ secrets.SSH_FINGERPRINT }}
                    source: ".env.${{ inputs.env_file }}"
                    target: ${{ secrets.DEPLOY_PATH }}

            -   name: Deploy application
                uses: appleboy/ssh-action@v1.2.2
                env:
                    DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
                    GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
                    GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
                    IMAGE_TAG: sha-${{ github.sha }}
                    IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
                    ENV_FILE: ${{ inputs.env_file }}
                    POST_DEPLOY_COMMAND: ${{ secrets.POST_DEPLOY_COMMAND }}
                    SYMFONY_DECRYPTION_SECRET: ${{ secrets.SYMFONY_DECRYPTION_SECRET }}
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    port: ${{ secrets.SSH_PORT }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    passphrase: ${{ secrets.SSH_PASSPHRASE }}
                    fingerprint: ${{ secrets.SSH_FINGERPRINT }}
                    envs: DEPLOY_PATH,ENV_FILE,GHCR_TOKEN,GHCR_USERNAME,IMAGE_NAMESPACE,IMAGE_TAG,POST_DEPLOY_COMMAND,SYMFONY_DECRYPTION_SECRET
                    script: |
                        set -eu
                        if [ -z "$DEPLOY_PATH" ]; then
                            echo "DEPLOY_PATH secret is required."
                            exit 1
                        fi
                        mkdir -p "$DEPLOY_PATH"
                        cd "$DEPLOY_PATH"
                        if [ ! -f ".env.$ENV_FILE" ]; then
                            echo ".env.$ENV_FILE is missing in $DEPLOY_PATH."
                            exit 1
                        fi
                        cp ".env.$ENV_FILE" .env
                        if [ -n "${SYMFONY_DECRYPTION_SECRET:-}" ]; then
                            printf '\nSYMFONY_DECRYPTION_SECRET=%s\n' "$SYMFONY_DECRYPTION_SECRET" >> .env
                        fi
                        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
                        set -a
                        . ./.env
                        set +a
                        export IMAGE_NAMESPACE IMAGE_TAG
                        docker compose -f compose.yml pull
                        docker compose -f compose.yml up -d
                        docker compose -f compose.yml exec -T --user www-data app php -r 'if (!getenv("SYMFONY_DECRYPTION_SECRET")) { fwrite(STDERR, "SYMFONY_DECRYPTION_SECRET is missing in the app container.\n"); exit(1); }'
                        docker compose -f compose.yml exec -T --user www-data app php bin/console debug:container --env-var=DB_PASSWORD --env="$APP_ENV" --no-debug >/dev/null
                        docker compose -f compose.yml exec -T --user www-data app php bin/console doctrine:migrations:migrate --env="$APP_ENV" --no-interaction --allow-no-migration
                        docker compose -f compose.yml exec -T --user www-data app php bin/console cache:clear --env="$APP_ENV" --no-debug
                        docker compose -f compose.yml exec -T --user www-data app php bin/console cache:warmup --env="$APP_ENV" --no-debug
                        docker compose -f compose.yml exec -T --user root app sh -lc 'chown -R www-data:www-data /srv/sylius/var /srv/sylius/public/media && chmod -R ug+rwX /srv/sylius/var /srv/sylius/public/media'
                        if [ -n "${POST_DEPLOY_COMMAND:-}" ]; then
                            sh -lc "$POST_DEPLOY_COMMAND"
                        fi
