name: Deploy

on:
    push:
        branches:
            - develop
            - main
    workflow_dispatch:
        inputs:
            environment:
                description: Deployment target
                required: true
                type: choice
                options:
                    - stage
                    - production

concurrency:
    group: deploy-${{ github.ref_name }}
    cancel-in-progress: true

permissions:
    contents: read
    packages: write

env:
    IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
    static-checks:
        name: Static checks
        uses: ./.github/workflows/ci_static-checks.yaml
        with:
            type: minimal

    tests:
        name: Tests
        needs: static-checks
        uses: ./.github/workflows/ci.yaml
        with:
            type: minimal

    javascript-tests:
        name: Javascript Tests
        needs: static-checks
        uses: ./.github/workflows/ci_js.yaml
        with:
            type: minimal

    build-images:
        name: Build and push images
        needs:
            - tests
            - javascript-tests
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Log in to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Extract metadata for app image
                id: meta-app
                uses: docker/metadata-action@v5
                with:
                    images: ghcr.io/${{ github.repository_owner }}/carpetunique-app
                    tags: |
                        type=raw,value=sha-${{ github.sha }}
                        type=raw,value=develop,enable=${{ github.ref_name == 'develop' }}
                        type=raw,value=main,enable=${{ github.ref_name == 'main' }}

            -   name: Extract metadata for web image
                id: meta-web
                uses: docker/metadata-action@v5
                with:
                    images: ghcr.io/${{ github.repository_owner }}/carpetunique-web
                    tags: |
                        type=raw,value=sha-${{ github.sha }}
                        type=raw,value=develop,enable=${{ github.ref_name == 'develop' }}
                        type=raw,value=main,enable=${{ github.ref_name == 'main' }}

            -   name: Build and push app image
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: docker/app/Dockerfile
                    push: true
                    tags: ${{ steps.meta-app.outputs.tags }}
                    labels: ${{ steps.meta-app.outputs.labels }}
                    cache-from: type=gha,scope=app
                    cache-to: type=gha,mode=max,scope=app

            -   name: Build and push web image
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: docker/web/Dockerfile
                    push: true
                    tags: ${{ steps.meta-web.outputs.tags }}
                    labels: ${{ steps.meta-web.outputs.labels }}
                    cache-from: type=gha,scope=web
                    cache-to: type=gha,mode=max,scope=web

    deploy-stage:
        name: Deploy stage
        if: |
            (github.event_name == 'push' && github.ref_name == 'develop') ||
            (github.event_name == 'workflow_dispatch' && inputs.environment == 'stage')
        needs:
            - build-images
        runs-on: ubuntu-latest
        environment:
            name: stage
            url: ${{ secrets.APP_URL }}
        steps:
            -   name: Upload deploy files
                uses: appleboy/scp-action@v0.1.7
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    port: ${{ secrets.SSH_PORT }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    passphrase: ${{ secrets.SSH_PASSPHRASE }}
                    fingerprint: ${{ secrets.SSH_FINGERPRINT }}
                    source: "deploy/compose.yml,deploy/Caddyfile"
                    target: ${{ secrets.DEPLOY_PATH }}
                    strip_components: 1

            -   name: Deploy application
                uses: appleboy/ssh-action@v1.2.2
                env:
                    DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
                    GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
                    GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
                    IMAGE_TAG: sha-${{ github.sha }}
                    IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
                    LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
                    POST_DEPLOY_COMMAND: ${{ secrets.POST_DEPLOY_COMMAND }}
                    SERVER_NAME: ${{ secrets.SERVER_NAME }}
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    port: ${{ secrets.SSH_PORT }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    passphrase: ${{ secrets.SSH_PASSPHRASE }}
                    fingerprint: ${{ secrets.SSH_FINGERPRINT }}
                    script_stop: true
                    envs: DEPLOY_PATH,GHCR_TOKEN,GHCR_USERNAME,IMAGE_NAMESPACE,IMAGE_TAG,LETSENCRYPT_EMAIL,POST_DEPLOY_COMMAND,SERVER_NAME
                    script: |
                        set -eu

                        if [ -z "$DEPLOY_PATH" ]; then
                            echo "DEPLOY_PATH secret is required."
                            exit 1
                        fi

                        mkdir -p "$DEPLOY_PATH"
                        cd "$DEPLOY_PATH"

                        if [ ! -f ".env.runtime" ]; then
                            echo ".env.runtime is missing in $DEPLOY_PATH."
                            exit 1
                        fi

                        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

                        export IMAGE_NAMESPACE IMAGE_TAG SERVER_NAME LETSENCRYPT_EMAIL
                        docker compose -f compose.yml pull
                        docker compose -f compose.yml up -d
                        docker compose -f compose.yml exec -T app php bin/console doctrine:migrations:migrate --env=prod --no-interaction --allow-no-migration
                        docker compose -f compose.yml exec -T app php bin/console cache:clear --env=prod --no-debug
                        docker compose -f compose.yml exec -T app php bin/console cache:warmup --env=prod --no-debug

                        if [ -n "${POST_DEPLOY_COMMAND:-}" ]; then
                            sh -lc "$POST_DEPLOY_COMMAND"
                        fi

    deploy-production:
        name: Deploy production
        if: |
            (github.event_name == 'push' && github.ref_name == 'main') ||
            (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
        needs:
            - build-images
        runs-on: ubuntu-latest
        environment:
            name: production
            url: ${{ secrets.APP_URL }}
        steps:
            -   name: Upload deploy files
                uses: appleboy/scp-action@v0.1.7
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    port: ${{ secrets.SSH_PORT }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    passphrase: ${{ secrets.SSH_PASSPHRASE }}
                    fingerprint: ${{ secrets.SSH_FINGERPRINT }}
                    source: "deploy/compose.yml,deploy/Caddyfile"
                    target: ${{ secrets.DEPLOY_PATH }}
                    strip_components: 1

            -   name: Deploy application
                uses: appleboy/ssh-action@v1.2.2
                env:
                    DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
                    GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
                    GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
                    IMAGE_TAG: sha-${{ github.sha }}
                    IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
                    LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
                    POST_DEPLOY_COMMAND: ${{ secrets.POST_DEPLOY_COMMAND }}
                    SERVER_NAME: ${{ secrets.SERVER_NAME }}
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    port: ${{ secrets.SSH_PORT }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    passphrase: ${{ secrets.SSH_PASSPHRASE }}
                    fingerprint: ${{ secrets.SSH_FINGERPRINT }}
                    script_stop: true
                    envs: DEPLOY_PATH,GHCR_TOKEN,GHCR_USERNAME,IMAGE_NAMESPACE,IMAGE_TAG,LETSENCRYPT_EMAIL,POST_DEPLOY_COMMAND,SERVER_NAME
                    script: |
                        set -eu

                        if [ -z "$DEPLOY_PATH" ]; then
                            echo "DEPLOY_PATH secret is required."
                            exit 1
                        fi

                        mkdir -p "$DEPLOY_PATH"
                        cd "$DEPLOY_PATH"

                        if [ ! -f ".env.runtime" ]; then
                            echo ".env.runtime is missing in $DEPLOY_PATH."
                            exit 1
                        fi

                        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

                        export IMAGE_NAMESPACE IMAGE_TAG SERVER_NAME LETSENCRYPT_EMAIL
                        docker compose -f compose.yml pull
                        docker compose -f compose.yml up -d
                        docker compose -f compose.yml exec -T app php bin/console doctrine:migrations:migrate --env=prod --no-interaction --allow-no-migration
                        docker compose -f compose.yml exec -T app php bin/console cache:clear --env=prod --no-debug
                        docker compose -f compose.yml exec -T app php bin/console cache:warmup --env=prod --no-debug

                        if [ -n "${POST_DEPLOY_COMMAND:-}" ]; then
                            sh -lc "$POST_DEPLOY_COMMAND"
                        fi
