server {
    listen 8080;
    server_name _;

    root /srv/sylius/public;
    index index.php;

    client_max_body_size 32m;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /srv/sylius/public/index.php;
        fastcgi_param DOCUMENT_ROOT /srv/sylius/public;
        fastcgi_read_timeout 300;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff|woff2)$ {
        expires 7d;
        access_log off;
    }
}
